<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat · pollinations.ai (Streaming SSE)</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background:#0b0d10; color:#e4e6eb; height:100vh; display:flex; justify-content:center; align-items:center; padding:16px; }
        .chat-container { width:100%; max-width:820px; height:96vh; max-height:720px; background:#14181c; border-radius:24px; box-shadow:0 20px 60px rgba(0,0,0,0.7); display:flex; flex-direction:column; overflow:hidden; }
        .chat-header { padding:18px 24px; border-bottom:1px solid rgba(255,255,255,0.06); display:flex; justify-content:space-between; align-items:center; flex-shrink:0; background:rgba(20,24,28,0.85); backdrop-filter:blur(8px); }
        .chat-header-left { display:flex; align-items:center; gap:12px; }
        .logo { width:32px; height:32px; background:linear-gradient(135deg,#d48a5a,#b8653e); border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; color:#fff; }
        .chat-header h1 { font-size:17px; font-weight:600; background:linear-gradient(135deg,#e4e6eb,#a8b2c0); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .badge { font-size:10px; font-weight:500; background:rgba(198,122,76,0.2); color:#d48a5a; padding:2px 10px; border-radius:20px; border:1px solid rgba(198,122,76,0.15); text-transform:uppercase; }
        .header-actions { display:flex; gap:10px; align-items:center; }
        .header-actions select { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); color:#d1d5db; padding:5px 12px; border-radius:8px; font-size:12px; font-weight:500; cursor:pointer; outline:none; }
        .header-actions select:hover { background:rgba(255,255,255,0.10); }
        .header-actions select option { background:#1e252b; color:#e4e6eb; }
        .btn-clear { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.06); color:#9ca3af; padding:5px 12px; border-radius:8px; font-size:12px; font-weight:500; cursor:pointer; transition:0.2s; }
        .btn-clear:hover { background:rgba(239,68,68,0.15); border-color:rgba(239,68,68,0.2); color:#f87171; }
        .btn-stop { background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.2); color:#f87171; padding:5px 12px; border-radius:8px; font-size:12px; font-weight:500; cursor:pointer; transition:0.2s; display:none; }
        .btn-stop.active { display:inline-block; }
        .btn-stop:hover { background:rgba(239,68,68,0.25); }
        .messages-area { flex:1; overflow-y:auto; padding:20px 24px 12px; display:flex; flex-direction:column; gap:12px; scroll-behavior:smooth; }
        .messages-area::-webkit-scrollbar { width:4px; }
        .messages-area::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); border-radius:20px; }
        
        #messagesContainer { display:flex; flex-direction:column; gap:14px; width:100%; }

        .message { display:flex; gap:12px; max-width:88%; animation:fadeSlideUp 0.3s ease-out; }
        .message.user { align-self:flex-end; flex-direction:row-reverse; }
        .message.ai { align-self:flex-start; }
        @keyframes fadeSlideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .message-avatar { width:32px; height:32px; border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:600; margin-top:2px; }
        .message.user .message-avatar { background:linear-gradient(135deg,#c67a4c,#a65a38); color:#fff; }
        .message.ai .message-avatar { background:linear-gradient(135deg,#1a2332,#2a3a4e); color:#d48a5a; border:1px solid rgba(212,138,90,0.15); }
        .message-bubble { background:#1e262e; padding:12px 16px; border-radius:16px; line-height:1.6; font-size:14.5px; word-wrap:break-word; border:1px solid rgba(255,255,255,0.04); position:relative; }
        .message.user .message-bubble { background:linear-gradient(135deg,#c67a4c,#a65a38); border-radius:16px; color:#fff; }
        .message.ai .message-bubble { border-radius:16px; }
        .message-bubble .message-text { white-space:pre-wrap; min-height:1em; }
        .message-bubble .message-text p { margin: 0 0 8px 0; }
        .message-bubble .message-text p:last-child { margin-bottom: 0; }
        .message-bubble .message-text ul { margin: 6px 0 8px 16px; padding-left: 4px; }
        .message-bubble .message-text ul li { margin-bottom: 4px; }
        .message-bubble code { background:rgba(0,0,0,0.3); padding:1px 6px; border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:13px; color:#fcd34d; }
        .message-bubble pre { background:rgba(0,0,0,0.4); padding:10px 14px; border-radius:8px; overflow-x:auto; margin:6px 0 2px; font-size:13px; font-family:'JetBrains Mono',monospace; border:1px solid rgba(255,255,255,0.05); color:#d1d5db; }
        .message-bubble pre code { background:transparent; padding:0; color:inherit; }
        .message-timestamp { font-size:10px; color:rgba(255,255,255,0.2); margin-top:4px; text-align:center; }
        .message-actions { display:flex; gap:6px; margin-top:6px; justify-content:center; }
        .message-actions button { background:rgba(255,255,255,0.04); border:none; color:rgba(255,255,255,0.25); padding:3px 10px; border-radius:6px; font-size:11px; cursor:pointer; transition:0.2s; }
        .message-actions button:hover { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.6); }
        .message-actions button.copied { color:#34d399; }
        .typing-indicator { display:none; align-items:center; gap:12px; padding:4px 0 8px; animation:fadeSlideUp 0.2s ease-out; }
        .typing-indicator.active { display:flex; }
        .typing-indicator .avatar { width:32px; height:32px; border-radius:10px; background:linear-gradient(135deg,#1a2332,#2a3a4e); border:1px solid rgba(212,138,90,0.12); display:flex; align-items:center; justify-content:center; font-size:14px; color:#d48a5a; flex-shrink:0; }
        .typing-dots { display:flex; gap:5px; background:#1e262e; padding:10px 18px; border-radius:16px; border:1px solid rgba(255,255,255,0.04); }
        .typing-dots span { width:8px; height:8px; background:#d48a5a; border-radius:50%; animation:dotPulse 1.4s infinite both; }
        .typing-dots span:nth-child(2), .typing-dots span:nth-child(3) { background:rgba(212,138,90,0.2); }
        .typing-dots span:nth-child(2) { animation-delay:0.2s; }
        .typing-dots span:nth-child(3) { animation-delay:0.4s; }
        @keyframes dotPulse { 0%,80%,100% { opacity:0.2; transform:scale(0.8); } 40% { opacity:1; transform:scale(1); } }
        .input-area { padding:14px 20px 20px; border-top:1px solid rgba(255,255,255,0.05); flex-shrink:0; background:rgba(20,24,28,0.8); backdrop-filter:blur(4px); display:flex; gap:10px; align-items:flex-end; }
        .input-wrapper { flex:1; background:rgba(255,255,255,0.04); border-radius:14px; border:1px solid rgba(255,255,255,0.06); transition:0.25s; display:flex; align-items:flex-end; }
        .input-wrapper:focus-within { border-color:rgba(198,122,76,0.4); background:rgba(255,255,255,0.06); box-shadow:0 0 0 3px rgba(198,122,76,0.08); }
        .input-wrapper textarea { width:100%; background:transparent; border:none; color:#e4e6eb; padding:12px 16px; font-size:14px; font-family:inherit; resize:none; outline:none; line-height:1.5; min-height:48px; max-height:140px; }
        .input-wrapper textarea::placeholder { color:rgba(255,255,255,0.2); }
        .btn-send { background:linear-gradient(135deg,#c67a4c,#a65a38); border:none; color:#fff; width:48px; height:48px; border-radius:14px; font-size:20px; cursor:pointer; transition:0.25s; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 4px 16px rgba(198,122,76,0.3); }
        .btn-send:hover:not(:disabled) { transform:scale(1.04); box-shadow:0 6px 24px rgba(198,122,76,0.45); }
        .btn-send:active:not(:disabled) { transform:scale(0.94); }
        .btn-send:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
        .btn-send svg { width:22px; height:22px; fill:currentColor; }
        .empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 20px; color:rgba(255,255,255,0.15); }
        .empty-state .icon { font-size:56px; margin-bottom:16px; opacity:0.5; }
        .empty-state h3 { font-size:18px; font-weight:500; color:rgba(255,255,255,0.25); margin-bottom:6px; }
        .empty-state p { font-size:13px; color:rgba(255,255,255,0.12); max-width:320px; }
        .hidden { display:none !important; }
        @media (max-width:600px) { .chat-container { max-height:none; height:100vh; border-radius:0; } .messages-area { padding:16px; } .message { max-width:94%; } .chat-header { padding:14px 16px; flex-wrap:wrap; } .input-area { padding:10px 14px 14px; } }
    </style>
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="chat-header-left">
                <div class="logo">✦</div>
                <h1>Polli Chat</h1>
                <span class="badge">Streaming SSE</span>
            </div>
            <div class="header-actions">
                <select id="modelSelect">
                    <option value="openai">GPT (OpenAI)</option>
                    <option value="claude">Claude</option>
                    <option value="llama">Llama</option>
                    <option value="mistral">Mistral</option>
                    <option value="gemini">Gemini</option>
                </select>
                <button class="btn-clear" id="clearBtn">Clear</button>
                <button class="btn-stop" id="stopBtn">⏹ Stop</button>
            </div>
        </header>

        <div class="messages-area" id="messagesArea">
            <div class="empty-state" id="emptyState">
                <div class="icon">✦</div>
                <h3>Start a conversation</h3>
                <p>Ask anything — streamed from pollinations.ai</p>
            </div>
            <div id="messagesContainer"></div>
            <div class="typing-indicator" id="typingIndicator">
                <div class="avatar">✦</div>
                <div class="typing-dots"><span></span><span></span><span></span></div>
            </div>
        </div>

        <footer class="input-area">
            <div class="input-wrapper">
                <textarea id="userInput" rows="1" placeholder="Type a message…" maxlength="4000"></textarea>
            </div>
            <button class="btn-send" id="sendBtn">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </footer>
    </div>

    <script>
        (function() {
            'use strict';

            // ─── DOM refs ─────────────────────────────────────────────
            const messagesContainer = document.getElementById('messagesContainer');
            const emptyState = document.getElementById('emptyState');
            const userInput = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const clearBtn = document.getElementById('clearBtn');
            const stopBtn = document.getElementById('stopBtn');
            const modelSelect = document.getElementById('modelSelect');
            const typingIndicator = document.getElementById('typingIndicator');
            const messagesArea = document.getElementById('messagesArea');

            // ─── State ────────────────────────────────────────────────
            const state = {
                messages: [],          // { role, content, timestamp }
                isProcessing: false,
                abortController: null, // for cancelling the current stream
            };

            // ─── LocalStorage persistence ────────────────────────────
            const STORAGE_KEY = 'polliChatMessages';

            function saveState() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.messages));
                } catch (_) { /* ignore */ }
            }

            function loadState() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        const parsed = JSON.parse(raw);
                        if (Array.isArray(parsed)) {
                            state.messages = parsed;
                            return true;
                        }
                    }
                } catch (_) { /* ignore */ }
                return false;
            }

            // ─── API (streaming SSE) ──────────────────────────────────
            const API_BASE = 'https://text.pollinations.ai';

            async function streamResponse(prompt, model, history, onChunk, signal) {
                let context = '';
                if (history.length > 0) {
                    const recent = history.slice(-10);
                    for (const msg of recent) {
                        context += `${msg.role === 'user' ? 'User' : 'AI'}: ${msg.content}\n`;
                    }
                }
                const fullPrompt = context ? `${context}User: ${prompt}\nAI:` : prompt;

                const seed = Math.floor(Math.random() * 2147483647);
                const encodedPrompt = encodeURIComponent(fullPrompt);
                const url = `${API_BASE}/${encodedPrompt}?model=${encodeURIComponent(model)}&seed=${seed}&stream=true`;

                const response = await fetch(url, {
                    method: 'GET',
                    headers: { 'Accept': 'text/event-stream' },
                    signal: signal,
                });

                if (!response.ok) {
                    const text = await response.text();
                    let errorMsg = `HTTP ${response.status}`;
                    try {
                        const json = JSON.parse(text);
                        if (json.error?.message) errorMsg = json.error.message;
                        else if (json.details?.error?.message) errorMsg = json.details.error.message;
                    } catch (_) { /* ignore */ }
                    throw new Error(errorMsg);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let accumulated = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (trimmed.startsWith('data: ')) {
                            const data = trimmed.slice(6).trim();
                            if (data === '[DONE]') {
                                return accumulated;
                            }
                            try {
                                const json = JSON.parse(data);
                                const delta = json.choices?.[0]?.delta;
                                if (delta?.content) {
                                    accumulated += delta.content;
                                    onChunk(accumulated);
                                }
                            } catch (_) { /* ignore */ }
                        }
                    }
                }
                return accumulated;
            }

            // ─── Render functions ────────────────────────────────────

            function renderMessages() {
                messagesContainer.innerHTML = '';
                if (state.messages.length === 0) {
                    emptyState.classList.remove('hidden');
                } else {
                    emptyState.classList.add('hidden');
                }

                for (const msg of state.messages) {
                    const el = createMessageElement(msg);
                    messagesContainer.appendChild(el);
                }
                scrollToBottom();
                saveState();
            }

            function createMessageElement(msg) {
                const wrapper = document.createElement('div');
                wrapper.className = `message ${msg.role}`;

                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.textContent = msg.role === 'user' ? 'U' : '✦';

                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';

                const textDiv = document.createElement('div');
                textDiv.className = 'message-text';
                textDiv.innerHTML = formatMessageText(msg.content);
                bubble.appendChild(textDiv);

                const ts = document.createElement('div');
                ts.className = 'message-timestamp';
                const date = msg.timestamp ? new Date(msg.timestamp) : new Date();
                ts.textContent = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                bubble.appendChild(ts);

                if (msg.role === 'ai') {
                    const actions = document.createElement('div');
                    actions.className = 'message-actions';
                    const copyBtn = document.createElement('button');
                    copyBtn.textContent = 'Copy';
                    copyBtn.addEventListener('click', () => {
                        navigator.clipboard.writeText(msg.content).then(() => {
                            copyBtn.textContent = 'Copied!';
                            copyBtn.classList.add('copied');
                            setTimeout(() => {
                                copyBtn.textContent = 'Copy';
                                copyBtn.classList.remove('copied');
                            }, 2000);
                        }).catch(() => {
                            const range = document.createRange();
                            range.selectNode(textDiv);
                            window.getSelection().removeAllRanges();
                            window.getSelection().addRange(range);
                            document.execCommand('copy');
                            copyBtn.textContent = 'Copied!';
                            setTimeout(() => {
                                copyBtn.textContent = 'Copy';
                            }, 2000);
                        });
                    });
                    actions.appendChild(copyBtn);
                    bubble.appendChild(actions);
                }

                wrapper.appendChild(avatar);
                wrapper.appendChild(bubble);
                return wrapper;
            }

            function formatMessageText(text) {
                if (!text) return '&nbsp;';
                let safeText = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

                let codeBlocks = [];
                safeText = safeText.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                    const id = `__CODE_BLOCK_${codeBlocks.length}__`;
                    codeBlocks.push(`<pre${lang ? ` class="lang-${lang}"` : ''}><code>${code.trim()}</code></pre>`);
                    return id;
                });

                safeText = safeText.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                safeText = safeText.replace(/\*([^*]+)\*/g, '<em>$1</em>');
                safeText = safeText.replace(/`([^`]+)`/g, '<code>$1</code>');

                const blocks = safeText.split(/\n{2,}/);
                let htmlParts = [];

                for (let block of blocks) {
                    block = block.trim();
                    if (!block) continue;

                    const lines = block.split('\n');

                    if (lines.length > 0 && /^[-*]\s/.test(lines[0].trim())) {
                        let listItems = [];
                        let currentItemLines = [];

                        for (let line of lines) {
                            line = line.trim();
                            if (/^[-*]\s/.test(line)) {
                                if (currentItemLines.length > 0) {
                                    listItems.push(`<li>${currentItemLines.join('<br>')}</li>`);
                                    currentItemLines = [];
                                }
                                currentItemLines.push(line.replace(/^[-*]\s/, ''));
                            } else {
                                if (line) currentItemLines.push(line);
                            }
                        }
                        if (currentItemLines.length > 0) {
                            listItems.push(`<li>${currentItemLines.join('<br>')}</li>`);
                        }
                        if (listItems.length > 0) {
                            htmlParts.push(`<ul>${listItems.join('')}</ul>`);
                        }
                    } else {
                        const pContent = block.replace(/\n/g, '<br>');
                        if (pContent) {
                            htmlParts.push(`<p>${pContent}</p>`);
                        }
                    }
                }

                let finalHtml = htmlParts.join('');
                for (let i = 0; i < codeBlocks.length; i++) {
                    finalHtml = finalHtml.split(`__CODE_BLOCK_${i}__`).join(codeBlocks[i]);
                }
                return finalHtml || '&nbsp;';
            }

            function scrollToBottom() {
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }

            // ─── Send message with streaming ─────────────────────────

            async function sendMessage() {
                const text = userInput.value.trim();
                if (!text || state.isProcessing) return;

                userInput.value = '';
                userInput.style.height = 'auto';

                const userMsg = { role: 'user', content: text, timestamp: new Date() };
                state.messages.push(userMsg);
                renderMessages();

                const aiMsg = { role: 'ai', content: '', timestamp: new Date() };
                
                typingIndicator.classList.add('active');
                
                state.isProcessing = true;
                sendBtn.disabled = true;
                userInput.disabled = true;
                stopBtn.classList.add('active');

                scrollToBottom();

                const abortController = new AbortController();
                state.abortController = abortController;

                let firstChunkReceived = false;
                let textDiv = null; 
                
                try {
                    const history = state.messages.slice(0, -1);
                    const model = modelSelect.value;

                    await streamResponse(text, model, history, (fullText) => {
                        if (!firstChunkReceived) {
                            firstChunkReceived = true;
                            typingIndicator.classList.remove('active');
                            
                            state.messages.push(aiMsg);
                            renderMessages();
                            
                            const messageElements = messagesContainer.querySelectorAll('.message');
                            const lastMsgEl = messageElements[messageElements.length - 1];
                            textDiv = lastMsgEl.querySelector('.message-text');
                        }
                        
                        if (textDiv) {
                            aiMsg.content = fullText;
                            textDiv.innerHTML = formatMessageText(fullText);
                            scrollToBottom();
                        }
                    }, abortController.signal);

                    if (!firstChunkReceived) {
                        typingIndicator.classList.remove('active');
                        aiMsg.content = '⚠️ No response received.';
                        state.messages.push(aiMsg);
                        renderMessages();
                    }

                } catch (error) {
                    typingIndicator.classList.remove('active');
                    if (error.name === 'AbortError') {
                        if (!firstChunkReceived) {
                            aiMsg.content = '⏹️ Stream cancelled.';
                            state.messages.push(aiMsg);
                            renderMessages();
                        } else if (textDiv) {
                            aiMsg.content += '\n\n⏹️ Stream cancelled.';
                            textDiv.innerHTML = formatMessageText(aiMsg.content);
                        }
                    } else {
                        if (!firstChunkReceived) {
                            aiMsg.content = `❌ ${error.message || 'Something went wrong. Please try again.'}`;
                            state.messages.push(aiMsg);
                            renderMessages();
                        } else if (textDiv) {
                            aiMsg.content += `\n\n❌ ${error.message}`;
                            textDiv.innerHTML = formatMessageText(aiMsg.content);
                        }
                    }
                } finally {
                    state.isProcessing = false;
                    state.abortController = null;
                    sendBtn.disabled = false;
                    userInput.disabled = false;
                    stopBtn.classList.remove('active');
                    userInput.focus();
                    renderMessages(); 
                    scrollToBottom();
                }
            }

            // ─── Stop streaming ─────────────────────────────────────

            function stopStream() {
                if (state.abortController) {
                    state.abortController.abort();
                }
            }

            // ─── Clear chat ──────────────────────────────────────────

            function clearChat() {
                if (state.messages.length === 0 || state.isProcessing) return;
                state.messages = [];
                renderMessages();
                userInput.focus();
            }

            // ─── Auto-resize textarea ──────────────────────────────

            function autoResizeTextarea() {
                userInput.style.height = 'auto';
                userInput.style.height = Math.min(userInput.scrollHeight, 140) + 'px';
            }

            // ─── Event listeners ────────────────────────────────────

            userInput.addEventListener('input', autoResizeTextarea);
            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            sendBtn.addEventListener('click', sendMessage);
            clearBtn.addEventListener('click', clearChat);
            stopBtn.addEventListener('click', stopStream);
            modelSelect.addEventListener('change', () => {});

            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    userInput.focus();
                }
            });

            // ─── Init ─────────────────────────────────────────────────

            if (!loadState()) {
                state.messages = [];
            }
            renderMessages();
            userInput.focus();
            console.log('✦ Polli Chat Claude Flavour ready');
        })();
    </script>
</body>
</html>
