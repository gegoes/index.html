<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiguelAI · pollinations.ai</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        
        /* FULL SCREEN DARK THEME */
        body { 
            font-family: Arial, sans-serif; 
            background:#1b1715; 
            color:#f5f5f5; 
            height:100vh; 
            width: 100vw;
            display:flex; 
            justify-content:center; 
            align-items:center; 
            padding:0; 
            overflow: hidden;
        }
        
        .chat-container { 
            width:100vw; 
            height:100vh; 
            max-width:100%; 
            max-height:100%; 
            border-radius:0; 
            background:#1b1715; 
            display:flex; 
            flex-direction:column; 
            overflow:hidden; 
            position: relative;
        }
        
        .chat-header { 
            padding:16px 24px; 
            border-bottom:1px solid rgba(255,255,255,0.06); 
            display:flex; 
            justify-content:space-between; 
            align-items:center; 
            flex-shrink:0; 
            background:rgba(27,23,21,0.8); 
            backdrop-filter:blur(8px); 
            z-index: 10;
        }
        
        .chat-header-left { display:flex; align-items:center; gap:12px; }
        
        /* MIGUEL ORANGE FLAVOR */
        .logo { 
            width:36px; height:36px; 
            background:#f36b3b; /* True Orange */
            border-radius:50%; /* Round logo like screenshot */
            display:flex; 
            align-items:center; 
            justify-content:center; 
            font-weight:700; 
            font-size:16px; 
            color:#fff; 
        }
        
        .header-brand { display: flex; flex-direction: column; line-height: 1.2; }
        .brand-name { font-size: 18px; font-weight: 600; letter-spacing: -0.5px; color: #fff; }
        .brand-sub { font-size: 9px; font-weight: 500; color: #9ca3af; letter-spacing: 0.5px; text-transform: uppercase; }
        
        .header-actions { display:flex; gap:10px; align-items:center; }
        .header-actions select { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); color:#d1d5db; padding:5px 12px; border-radius:8px; font-size:12px; font-weight:500; cursor:pointer; outline:none; }
        .btn-clear { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.06); color:#9ca3af; padding:5px 12px; border-radius:8px; font-size:12px; font-weight:500; cursor:pointer; transition:0.2s; }
        .btn-clear:hover { background:rgba(239,68,68,0.15); border-color:rgba(239,68,68,0.2); color:#f87171; }
        .btn-stop { background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.2); color:#f87171; padding:5px 12px; border-radius:8px; font-size:12px; font-weight:500; cursor:pointer; transition:0.2s; display:none; }
        .btn-stop.active { display:inline-block; }

        /* HOME SCREEN - EXACTLY LIKE SCREENSHOT */
        .home-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            width: 100%;
            transition: opacity 0.3s ease;
        }
        .home-screen.hidden {
            display: none;
        }
        .home-title {
            font-family: 'Georgia', 'Times New Roman', serif; /* Serif like screenshot */
            font-size: 3.5rem;
            font-weight: 400;
            color: #f5f5f5;
            margin-bottom: 12px;
            text-align: center;
            letter-spacing: -1px;
        }
        .home-desc {
            font-size: 16px;
            color: #9ca3af;
            text-align: center;
            max-width: 500px;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .suggestions-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            max-width: 700px;
        }
        .suggestion-pill {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 24px;
            border-radius: 9999px;
            color: #e5e7eb;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .suggestion-pill:hover {
            background: rgba(243, 107, 59, 0.2); /* Orange glow */
            border-color: #f36b3b;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(243, 107, 59, 0.15);
        }

        /* CHAT INTERFACE */
        .chat-interface {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            overflow: hidden;
            display: none; /* Hidden by default */
        }
        .chat-interface.active {
            display: flex;
        }
        
        .messages-area { 
            flex:1; 
            overflow-y:auto; 
            padding:20px 24px 12px; 
            display:flex; 
            flex-direction:column; 
            gap:12px; 
            scroll-behavior:smooth; 
        }
        .messages-area::-webkit-scrollbar { width:4px; }
        .messages-area::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); border-radius:20px; }

        #messagesContainer { display:flex; flex-direction:column; gap:14px; width:100%; }

        .message { display:flex; gap:12px; max-width:88%; animation:fadeSlideUp 0.3s ease-out; }
        .message.user { align-self:flex-end; flex-direction:row-reverse; }
        .message.ai { align-self:flex-start; }
        @keyframes fadeSlideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        
        .message-avatar { width:32px; height:32px; border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:600; margin-top:2px; }
        .message.user .message-avatar { background:#f36b3b; color:#fff; }
        .message.ai .message-avatar { background:#26211e; color:#f36b3b; border:1px solid rgba(243,107,59,0.2); }
        
        .message-bubble { background:#26211e; padding:12px 16px; border-radius:16px; line-height:1.6; font-size:14.5px; word-wrap:break-word; border:1px solid rgba(255,255,255,0.04); position:relative; }
        .message.user .message-bubble { background:#f36b3b; border-radius:16px; color:#fff; }
        .message.ai .message-bubble { border-radius:16px; }
        
        .message-bubble .message-text { white-space:pre-wrap; min-height:1em; }
        .message-bubble .message-text p { margin: 0 0 8px 0; }
        .message-bubble .message-text p:last-child { margin-bottom: 0; }
        .message-bubble .message-text ul { margin: 6px 0 8px 16px; padding-left: 4px; }
        .message-bubble .message-text ul li { margin-bottom: 4px; }
        .message-bubble code { background:rgba(0,0,0,0.3); padding:1px 6px; border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:13px; color:#fcd34d; }
        .message-bubble pre { background:rgba(0,0,0,0.4); padding:10px 14px; border-radius:8px; overflow-x:auto; margin:6px 0 2px; font-size:13px; font-family:'JetBrains Mono',monospace; border:1px solid rgba(255,255,255,0.05); color:#d1d5db; }
        .message-bubble pre code { background:transparent; padding:0; color:inherit; }
        
        .message-timestamp { font-size:10px; color:rgba(255,255,255,0.2); margin-top:4px; text-align:center; }
        .message-actions { display:flex; gap:6px; margin-top:6px; justify-content:center; }
        .message-actions button { background:rgba(255,255,255,0.04); border:none; color:rgba(255,255,255,0.25); padding:3px 10px; border-radius:6px; font-size:11px; cursor:pointer; transition:0.2s; }
        .message-actions button:hover { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.6); }
        .message-actions button.copied { color:#34d399; }
        
        .typing-indicator { display:none; align-items:center; gap:12px; padding:4px 0 8px; animation:fadeSlideUp 0.2s ease-out; }
        .typing-indicator.active { display:flex; }
        .typing-indicator .avatar { width:32px; height:32px; border-radius:10px; background:#26211e; border:1px solid rgba(243,107,59,0.2); display:flex; align-items:center; justify-content:center; font-size:14px; color:#f36b3b; flex-shrink:0; }
        .typing-dots { display:flex; gap:5px; background:#26211e; padding:10px 18px; border-radius:16px; border:1px solid rgba(255,255,255,0.04); }
        .typing-dots span { width:8px; height:8px; background:#f36b3b; border-radius:50%; animation:dotPulse 1.4s infinite both; }
        .typing-dots span:nth-child(2), .typing-dots span:nth-child(3) { background:rgba(243,107,59,0.2); }
        .typing-dots span:nth-child(2) { animation-delay:0.2s; }
        .typing-dots span:nth-child(3) { animation-delay:0.4s; }
        @keyframes dotPulse { 0%,80%,100% { opacity:0.2; transform:scale(0.8); } 40% { opacity:1; transform:scale(1); } }
        
        /* INPUT AREA */
        .input-area { padding:14px 20px 20px; border-top:1px solid rgba(255,255,255,0.05); flex-shrink:0; background:rgba(27,23,21,0.8); backdrop-filter:blur(4px); display:flex; gap:10px; align-items:flex-end; }
        .input-wrapper { flex:1; background:rgba(255,255,255,0.06); border-radius:14px; border:1px solid rgba(255,255,255,0.08); transition:0.25s; display:flex; align-items:flex-end; }
        .input-wrapper:focus-within { border-color:#f36b3b; background:rgba(255,255,255,0.08); box-shadow:0 0 0 3px rgba(243,107,59,0.15); }
        .input-wrapper textarea { width:100%; background:transparent; border:none; color:#e4e6eb; padding:12px 16px; font-size:14px; font-family:inherit; resize:none; outline:none; line-height:1.5; min-height:48px; max-height:140px; }
        .input-wrapper textarea::placeholder { color:rgba(255,255,255,0.3); }
        
        .btn-send { background:#f36b3b; border:none; color:#fff; width:48px; height:48px; border-radius:14px; font-size:20px; cursor:pointer; transition:0.25s; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 4px 16px rgba(243,107,59,0.3); }
        .btn-send:hover:not(:disabled) { transform:scale(1.04); box-shadow:0 6px 24px rgba(243,107,59,0.4); }
        .btn-send:active:not(:disabled) { transform:scale(0.94); }
        .btn-send:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
        .btn-send svg { width:22px; height:22px; fill:currentColor; }

        @media (max-width:600px) { 
            .home-title { font-size: 2.5rem; }
            .suggestions-grid { gap: 10px; max-width: 90%; }
            .suggestion-pill { font-size: 13px; padding: 10px 16px; }
            .message { max-width:94%; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- HEADER -->
        <header class="chat-header">
            <div class="chat-header-left">
                <div class="logo">✦</div>
                <div class="header-brand">
                    <span class="brand-name">MiguelAI</span>
                    <span class="brand-sub">Powered by Groq</span>
                </div>
            </div>
            <div class="header-actions">
                <select id="modelSelect">
                    <option value="openai">GPT (OpenAI)</option>
                    <option value="claude">Claude</option>
                    <option value="llama">Llama</option>
                    <option value="mistral">Mistral</option>
                    <option value="gemini">Gemini</option>
                </select>
                <button class="btn-clear" id="clearBtn">Clear</button>
                <button class="btn-stop" id="stopBtn">⏹ Stop</button>
            </div>
        </header>

        <!-- HOME SCREEN (EXACTLY LIKE MIGUELAI) -->
        <div id="homescreen" class="home-screen">
            <h1 class="home-title">Ask anything.</h1>
            <p class="home-desc">Powered by Groq — ask anything and get a clear, professional answer instantly.</p>
            <div class="suggestions-grid">
                <button class="suggestion-pill" data-prompt="Why is 1+1 equal to 2?">Why is 1+1 equal to 2?</button>
                <button class="suggestion-pill" data-prompt="How does the internet actually work?">How does the internet actually work?</button>
                <button class="suggestion-pill" data-prompt="What is quantum entanglement?">What is quantum entanglement?</button>
                <button class="suggestion-pill" data-prompt="Explain the Roman Empire in 3 sentences">Explain the Roman Empire in 3 sentences</button>
                <button class="suggestion-pill" data-prompt="What causes black holes?">What causes black holes?</button>
            </div>
        </div>

        <!-- CHAT INTERFACE (HIDDEN INITIALLY) -->
        <div id="chatInterface" class="chat-interface">
            <div class="messages-area" id="messagesArea">
                <div id="messagesContainer"></div>
                <div class="typing-indicator" id="typingIndicator">
                    <div class="avatar">✦</div>
                    <div class="typing-dots"><span></span><span></span><span></span></div>
                </div>
            </div>
        </div>

        <!-- INPUT AREA (Always visible at the bottom) -->
        <footer class="input-area">
            <div class="input-wrapper">
                <textarea id="userInput" rows="1" placeholder="Type a message…" maxlength="4000"></textarea>
            </div>
            <button class="btn-send" id="sendBtn">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </footer>
    </div>

    <script>
        (function() {
            'use strict';

            const messagesContainer = document.getElementById('messagesContainer');
            const userInput = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const clearBtn = document.getElementById('clearBtn');
            const stopBtn = document.getElementById('stopBtn');
            const modelSelect = document.getElementById('modelSelect');
            const typingIndicator = document.getElementById('typingIndicator');
            const messagesArea = document.getElementById('messagesArea');

            // New DOM elements for homescreen toggling
            const homeScreen = document.getElementById('homescreen');
            const chatInterface = document.getElementById('chatInterface');
            const suggestionPills = document.querySelectorAll('.suggestion-pill');

            const state = {
                messages: [],          // { role, content, timestamp }
                isProcessing: false,
                abortController: null,
                hasStarted: false,     // Tracks if user has started the chat
            };

            const STORAGE_KEY = 'polliChatMessages';

            function saveState() {
                try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.messages)); } catch (_) {}
            }

            function loadState() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        const parsed = JSON.parse(raw);
                        if (Array.isArray(parsed)) {
                            state.messages = parsed;
                            return true;
                        }
                    }
                } catch (_) {}
                return false;
            }

            // Helper to toggle between Chat and Homescreen
            function updateView() {
                if (state.messages.length === 0 && !state.hasStarted) {
                    homeScreen.classList.remove('hidden');
                    chatInterface.classList.remove('active');
                } else {
                    homeScreen.classList.add('hidden');
                    chatInterface.classList.add('active');
                }
            }

            async function streamResponse(prompt, model, history, onChunk, signal) {
                let context = '';
                if (history.length > 0) {
                    const recent = history.slice(-10);
                    for (const msg of recent) {
                        context += `${msg.role === 'user' ? 'User' : 'AI'}: ${msg.content}\n`;
                    }
                }
                const fullPrompt = context ? `${context}User: ${prompt}\nAI:` : prompt;

                const seed = Math.floor(Math.random() * 2147483647);
                const encodedPrompt = encodeURIComponent(fullPrompt);
                const url = `https://text.pollinations.ai/${encodedPrompt}?model=${encodeURIComponent(model)}&seed=${seed}&stream=true`;

                const response = await fetch(url, {
                    method: 'GET',
                    headers: { 'Accept': 'text/event-stream' },
                    signal: signal,
                });

                if (!response.ok) {
                    const text = await response.text();
                    let errorMsg = `HTTP ${response.status}`;
                    try {
                        const json = JSON.parse(text);
                        if (json.error?.message) errorMsg = json.error.message;
                        else if (json.details?.error?.message) errorMsg = json.details.error.message;
                    } catch (_) {}
                    throw new Error(errorMsg);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let accumulated = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (trimmed.startsWith('data: ')) {
                            const data = trimmed.slice(6).trim();
                            if (data === '[DONE]') return accumulated;
                            try {
                                const json = JSON.parse(data);
                                const delta = json.choices?.[0]?.delta;
                                if (delta?.content) {
                                    accumulated += delta.content;
                                    onChunk(accumulated);
                                }
                            } catch (_) {}
                        }
                    }
                }
                return accumulated;
            }

            function renderMessages() {
                messagesContainer.innerHTML = '';
                for (const msg of state.messages) {
                    const el = createMessageElement(msg);
                    messagesContainer.appendChild(el);
                }
                scrollToBottom();
                saveState();
            }

            function createMessageElement(msg) {
                const wrapper = document.createElement('div');
                wrapper.className = `message ${msg.role}`;

                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.textContent = msg.role === 'user' ? 'U' : '✦';

                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';

                const textDiv = document.createElement('div');
                textDiv.className = 'message-text';
                textDiv.innerHTML = formatMessageText(msg.content);
                bubble.appendChild(textDiv);

                const ts = document.createElement('div');
                ts.className = 'message-timestamp';
                const date = msg.timestamp ? new Date(msg.timestamp) : new Date();
                ts.textContent = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                bubble.appendChild(ts);

                if (msg.role === 'ai') {
                    const actions = document.createElement('div');
                    actions.className = 'message-actions';
                    const copyBtn = document.createElement('button');
                    copyBtn.textContent = 'Copy';
                    copyBtn.addEventListener('click', () => {
                        navigator.clipboard.writeText(msg.content).then(() => {
                            copyBtn.textContent = 'Copied!';
                            copyBtn.classList.add('copied');
                            setTimeout(() => {
                                copyBtn.textContent = 'Copy';
                                copyBtn.classList.remove('copied');
                            }, 2000);
                        }).catch(() => {
                            const range = document.createRange();
                            range.selectNode(textDiv);
                            window.getSelection().removeAllRanges();
                            window.getSelection().addRange(range);
                            document.execCommand('copy');
                            copyBtn.textContent = 'Copied!';
                            setTimeout(() => { copyBtn.textContent = 'Copy'; }, 2000);
                        });
                    });
                    actions.appendChild(copyBtn);
                    bubble.appendChild(actions);
                }

                wrapper.appendChild(avatar);
                wrapper.appendChild(bubble);
                return wrapper;
            }

            function formatMessageText(text) {
                if (!text) return '&nbsp;';
                let safeText = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

                let codeBlocks = [];
                safeText = safeText.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                    const id = `__CODE_BLOCK_${codeBlocks.length}__`;
                    codeBlocks.push(`<pre${lang ? ` class="lang-${lang}"` : ''}><code>${code.trim()}</code></pre>`);
                    return id;
                });

                safeText = safeText.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                safeText = safeText.replace(/\*([^*]+)\*/g, '<em>$1</em>');
                safeText = safeText.replace(/`([^`]+)`/g, '<code>$1</code>');

                const blocks = safeText.split(/\n{2,}/);
                let htmlParts = [];

                for (let block of blocks) {
                    block = block.trim();
                    if (!block) continue;

                    const lines = block.split('\n');

                    if (lines.length > 0 && /^[-*]\s/.test(lines[0].trim())) {
                        let listItems = [];
                        let currentItemLines = [];

                        for (let line of lines) {
                            line = line.trim();
                            if (/^[-*]\s/.test(line)) {
                                if (currentItemLines.length > 0) {
                                    listItems.push(`<li>${currentItemLines.join('<br>')}</li>`);
                                    currentItemLines = [];
                                }
                                currentItemLines.push(line.replace(/^[-*]\s/, ''));
                            } else {
                                if (line) currentItemLines.push(line);
                            }
                        }
                        if (currentItemLines.length > 0) {
                            listItems.push(`<li>${currentItemLines.join('<br>')}</li>`);
                        }
                        if (listItems.length > 0) {
                            htmlParts.push(`<ul>${listItems.join('')}</ul>`);
                        }
                    } else {
                        const pContent = block.replace(/\n/g, '<br>');
                        if (pContent) {
                            htmlParts.push(`<p>${pContent}</p>`);
                        }
                    }
                }

                let finalHtml = htmlParts.join('');
                for (let i = 0; i < codeBlocks.length; i++) {
                    finalHtml = finalHtml.split(`__CODE_BLOCK_${i}__`).join(codeBlocks[i]);
                }
                return finalHtml || '&nbsp;';
            }

            function scrollToBottom() {
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }

            async function triggerChat(text) {
                text = text.trim();
                if (!text || state.isProcessing) return;

                // If this is the first message, mark it and switch views.
                if (!state.hasStarted) {
                    state.hasStarted = true;
                    updateView();
                }

                const userMsg = { role: 'user', content: text, timestamp: new Date() };
                state.messages.push(userMsg);
                renderMessages();

                const aiMsg = { role: 'ai', content: '', timestamp: new Date() };
                
                typingIndicator.classList.add('active');
                state.isProcessing = true;
                sendBtn.disabled = true;
                userInput.disabled = true;
                stopBtn.classList.add('active');
                scrollToBottom();

                const abortController = new AbortController();
                state.abortController = abortController;

                let firstChunkReceived = false;
                let textDiv = null; 
                
                try {
                    const history = state.messages.slice(0, -1);
                    const model = modelSelect.value;

                    await streamResponse(text, model, history, (fullText) => {
                        if (!firstChunkReceived) {
                            firstChunkReceived = true;
                            typingIndicator.classList.remove('active');
                            
                            state.messages.push(aiMsg);
                            renderMessages();
                            
                            const messageElements = messagesContainer.querySelectorAll('.message');
                            const lastMsgEl = messageElements[messageElements.length - 1];
                            textDiv = lastMsgEl.querySelector('.message-text');
                        }
                        
                        if (textDiv) {
                            aiMsg.content = fullText;
                            textDiv.innerHTML = formatMessageText(fullText);
                            scrollToBottom();
                        }
                    }, abortController.signal);

                    if (!firstChunkReceived) {
                        typingIndicator.classList.remove('active');
                        aiMsg.content = '⚠️ No response received.';
                        state.messages.push(aiMsg);
                        renderMessages();
                    }

                } catch (error) {
                    typingIndicator.classList.remove('active');
                    if (error.name === 'AbortError') {
                        if (!firstChunkReceived) {
                            aiMsg.content = '⏹️ Stream cancelled.';
                            state.messages.push(aiMsg);
                            renderMessages();
                        } else if (textDiv) {
                            aiMsg.content += '\n\n⏹️ Stream cancelled.';
                            textDiv.innerHTML = formatMessageText(aiMsg.content);
                        }
                    } else {
                        if (!firstChunkReceived) {
                            aiMsg.content = `❌ ${error.message || 'Something went wrong.'}`;
                            state.messages.push(aiMsg);
                            renderMessages();
                        } else if (textDiv) {
                            aiMsg.content += `\n\n❌ ${error.message}`;
                            textDiv.innerHTML = formatMessageText(aiMsg.content);
                        }
                    }
                } finally {
                    state.isProcessing = false;
                    state.abortController = null;
                    sendBtn.disabled = false;
                    userInput.disabled = false;
                    stopBtn.classList.remove('active');
                    userInput.value = ''; // Clear input on submit
                    userInput.focus();
                    renderMessages(); 
                    scrollToBottom();
                }
            }

            // ─── EVENT LISTENERS ────────────────────────────────────

            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    triggerChat(userInput.value);
                }
            });
            sendBtn.addEventListener('click', () => triggerChat(userInput.value));

            // Listen to suggestion pill clicks
            suggestionPills.forEach(pill => {
                pill.addEventListener('click', (e) => {
                    const prompt = e.currentTarget.getAttribute('data-prompt');
                    userInput.value = prompt; // Put text into input for visual state
                    triggerChat(prompt);
                });
            });

            function stopStream() {
                if (state.abortController) state.abortController.abort();
            }
            stopBtn.addEventListener('click', stopStream);

            function clearChat() {
                if (state.messages.length === 0 || state.isProcessing) return;
                state.messages = [];
                state.hasStarted = false; // Reset state to show homescreen
                updateView();
                renderMessages();
                userInput.focus();
            }
            clearBtn.addEventListener('click', clearChat);

            function autoResizeTextarea() {
                userInput.style.height = 'auto';
                userInput.style.height = Math.min(userInput.scrollHeight, 140) + 'px';
            }
            userInput.addEventListener('input', autoResizeTextarea);

            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    userInput.focus();
                }
            });

            // ─── INIT ─────────────────────────────────────────────────

            if (!loadState()) {
                state.messages = [];
            }
            // If previous messages exist, mark as started.
            if (state.messages.length > 0) {
                state.hasStarted = true;
            }
            
            updateView();
            renderMessages();
            userInput.focus();
        })();
    </script>
</body>
</html>
